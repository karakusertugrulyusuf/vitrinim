{% extends "base.html" %}

{% block title %}Ürünü Düzenle - {{ product.name }}{% endblock %}

{% block content %}
    <h1>Ürünü Düzenle - {{ product.name }}</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Güncelle</button>
    </form>

    <p><a href="{% url 'seller_profile' %}">&larr; Satıcı Profiline Dön</a></p>
{% endblock %}
